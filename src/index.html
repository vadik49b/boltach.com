<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta charset="UTF-8" />
    <title>Vadim&apos;s Boltach personal website</title>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/favicon-16x16.png"
    />
    <link rel="manifest" href="assets/site.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="app.ts"></script>
  </head>
  <body class="container">
    <main class="main">
      <picture class="jar-head">
        <source srcset="assets/avatar_logo.avif" type="image/avif" />
        <img
          class="avatar"
          width="128"
          height="128"
          decoding="async"
          loading="lazy"
          src="assets/avatar_logo.jpeg"
          alt="My head in a jar"
        />
      </picture>
      <h1 class="fullname">Vadim Boltach</h1>
      <p class="summary">
        Hi 👋. I&apos;m a Sr. SWE with expertise in web development. Learning
        and helping others to learn at
        <a href="https://www.coursera.org/" target="_blank">Coursera.</a> Love
        minimalist design and thoughtful UX. Advocate for fast software.
      </p>
      <a
        class="download-resume-link"
        href="assets/vadim_boltach_cv.pdf"
        download
      >
        Download CV (PDF, 67 Kb)
      </a>
    </main>
  </body>
</html>
